<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>卖出分析</title>
  <style>
    body{margin:0;background:#F7FAFC;color:#1F2937;font:16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    header{background:#183B56;color:white;padding:40px 6vw}
    main{max-width:1000px;margin:auto;padding:28px 24px}
    .grid{display:grid;gap:14px}
    a.card{display:block;padding:18px;border:1px solid #CBD5E1;background:white;border-radius:6px;color:#0F766E;text-decoration:none;font-size:20px;font-weight:800}
    a.date-card{display:block;padding:18px;border:1px solid #99F6E4;background:#ECFDF5;border-radius:6px;color:#0F766E;text-decoration:none;font-size:24px;font-weight:900}
    .panel-title-row{display:flex;align-items:baseline;justify-content:space-between;gap:14px}
    .panel-title-row h2{margin:0}
    .latest-date{color:#64748B;font-size:14px;font-weight:800}
    .exit-latest-card{margin-top:14px;background:#ECFDF5!important;border-color:#99F6E4!important}
    .history-title{margin:18px 0 10px;color:#64748B;font-size:15px}
    .history-grid{display:flex;flex-wrap:wrap;gap:8px}
    a.date-chip{display:inline-flex;align-items:center;padding:7px 10px;border:1px solid #CBD5E1;background:#F8FAFC;border-radius:6px;color:#0F766E;text-decoration:none;font-size:13px;font-weight:800}
    .panel{margin-top:18px;padding:18px;border:1px solid #CBD5E1;background:white;border-radius:6px}
    .hint{color:#64748B;line-height:1.6}
    label{display:block;margin:0 0 8px;font-weight:800}
    textarea{box-sizing:border-box;width:100%;min-height:150px;resize:vertical;border:1px solid #CBD5E1;border-radius:6px;padding:14px;background:#FFFFFF;color:#1F2937;font:16px ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.5}
    textarea::placeholder{color:#94A3B8}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{border:1px solid #0F766E;border-radius:6px;background:#0F766E;color:white;padding:10px 14px;font:inherit;font-weight:800;cursor:pointer}
    button.secondary{background:white;color:#0F766E}
    .status{min-height:22px;margin-top:10px;color:#64748B}
    pre{padding:16px;border:1px solid #CBD5E1;border-radius:6px;background:#F8FAFC;overflow:auto}
    code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  </style>
</head>
<body>
  <header>
    <h1>卖出分析</h1>
    <p>只放股票代码和买入/观察日期，不放仓位、成本、账户信息。</p>
  </header>
  <main>
    <div class="grid">
      <a class="card" href="../latest/index.html">返回最新选股结果</a>
    </div>

    <section class="panel latest-exit-risk">
      <div class="panel-title-row">
        <h2>最新卖出分析</h2>
        <span class="latest-date">2026-06-29</span>
      </div>
      <a class="card exit-latest-card" href="../latest/exit-risk-index.html?v=20260629131259">打开最新卖出分析</a>
      <h3 class="history-title">卖出分析历史</h3>
      <div class="history-grid">
        <a class="date-chip" href="../2026-06-29/exit-risk-index.html?v=20260629131259">2026-06-29</a>
        <a class="date-chip" href="../2026-06-26/exit-risk-index.html?v=20260629131259">2026-06-26</a>
      </div>
    </section>

    <section class="panel">
      <h2>卖出分析输入</h2>
      <label for="raw-input">输入股票和买入/观察日期</label>
      <textarea id="raw-input" placeholder="例如：
06/30/2026, MRVL, MU, AVGO
2026-07-01, HOOD, AMD
MRVL, MU, AVGO
remove AVGO">06/30/2026, MRVL, AVGO, IP, RCL, RTX, BRO, CLX, ED, EQR, GPC, HOOD, IR, J, MKC, FIG, FIGR</textarea>
      <div class="actions">
        <button type="button" id="save-button">保存 tickers.txt</button>
      </div>
      <p class="status" id="status"></p>
      <label for="formatted-output">整理后的文件内容</label>
      <textarea id="formatted-output" readonly placeholder="整理后的 tickers.txt 会显示在这里"></textarea>
    </section>

    <p class="hint">研究与教育用途，不构成投资建议。</p>
  </main>
  <script>
    const rawInput = document.querySelector('#raw-input');
    const output = document.querySelector('#formatted-output');
    const status = document.querySelector('#status');
    const datePattern = /^(\d{4}-\d{1,2}-\d{1,2}|\d{1,2}\/\d{1,2}\/\d{2,4})$/;
    const tickerPattern = /^[A-Z][A-Z0-9.\-]*$/;

    function cleanToken(token) {
      return token.trim().replace(/^[,，]+|[,，]+$/g, '');
    }

    function tokensFromLine(line) {
      return line
        .split('#')[0]
        .split(/[\s,，\t]+/)
        .map(cleanToken)
        .filter(Boolean);
    }

    function parseInput(text) {
      const rows = [];
      const removeSet = new Set();
      for (const rawLine of text.split(/\r?\n/)) {
        const tokens = tokensFromLine(rawLine);
        if (!tokens.length) continue;
        const first = tokens[0];
        if (/^(remove|rm|delete|del|删除|移除)$/i.test(first)) {
          tokens
            .slice(1)
            .map(token => token.toUpperCase())
            .filter(token => tickerPattern.test(token))
            .forEach(ticker => removeSet.add(ticker));
          continue;
        }
        if (datePattern.test(first)) {
          const tickers = tokens.slice(1).map(token => token.toUpperCase()).filter(token => tickerPattern.test(token));
          if (tickers.length) rows.push({dateFirst: true, date: first, tickers});
          continue;
        }
        const dateToken = tokens.find(token => datePattern.test(token));
        if (dateToken) {
          const ticker = first.toUpperCase();
          if (tickerPattern.test(ticker)) rows.push({dateFirst: false, date: dateToken, tickers: [ticker]});
          continue;
        }
        const tickers = tokens.map(token => token.toUpperCase()).filter(token => tickerPattern.test(token));
        if (tickers.length) rows.push({dateFirst: false, date: "", tickers});
      }
      return {rows, removeSet};
    }

    function rowKey(row) {
      return `${row.dateFirst ? 'date-first' : 'ticker-first'}|${row.date || ''}`;
    }

    function rowToText(row) {
      if (row.dateFirst) return `${row.date}, ${row.tickers.join(', ')}`;
      if (row.date) return row.tickers.map(ticker => `${ticker} ${row.date}`).join('\n');
      return row.tickers.join(', ');
    }

    function mergeTickerText(existingText, incomingText) {
      const existing = parseInput(existingText);
      const incoming = parseInput(incomingText);
      const removeSet = incoming.removeSet;
      const rows = [];
      const known = new Set();
      let added = 0;

      for (const row of existing.rows) {
        const tickers = row.tickers.filter(ticker => {
          if (removeSet.has(ticker) || known.has(ticker)) return false;
          known.add(ticker);
          return true;
        });
        if (tickers.length) rows.push({...row, tickers});
      }

      for (const row of incoming.rows) {
        const tickers = row.tickers.filter(ticker => {
          if (removeSet.has(ticker) || known.has(ticker)) return false;
          known.add(ticker);
          added += 1;
          return true;
        });
        if (!tickers.length) continue;
        const key = rowKey(row);
        const target = rows.find(existingRow => rowKey(existingRow) === key);
        if (target) target.tickers = [...target.tickers, ...tickers];
        else rows.push({...row, tickers});
      }

      return {
        content: rows.map(rowToText).join('\n'),
        added,
        removed: removeSet.size,
      };
    }

    function formatInput() {
      const parsed = parseInput(rawInput.value);
      const content = parsed.rows.map(rowToText).join('\n');
      output.value = content;
      const removeText = parsed.removeSet.size ? `，准备移除 ${Array.from(parsed.removeSet).join(', ')}` : '';
      status.textContent = content || parsed.removeSet.size ? `已整理 ${parsed.rows.length} 行${removeText}。` : '没有识别到有效股票代码。';
      return content;
    }

    async function saveViaLocalService() {
      const response = await fetch('http://127.0.0.1:8765/save-exit-risk-tickers', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({raw: rawInput.value}),
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const payload = await response.json();
      output.value = payload.content || '';
      rawInput.value = payload.content || rawInput.value;
      return `已合并保存到 Daily Metrics：新增 ${payload.added || 0}，删除 ${payload.removed || 0}`;
    }

    async function saveViaFilePicker() {
      if (!window.showOpenFilePicker) throw new Error('file picker unavailable');
      status.textContent = '请选择 daily-metrics-archive/inputs/exit-risk/tickers.txt。';
      const [handle] = await window.showOpenFilePicker({
        multiple: false,
        types: [{description: 'tickers.txt', accept: {'text/plain': ['.txt']}}],
      });
      const file = await handle.getFile();
      const existingText = await file.text();
      const merged = mergeTickerText(existingText, rawInput.value);
      if (!merged.content.trim()) throw new Error('merged content is empty');
      const writable = await handle.createWritable();
      await writable.write(`${merged.content.trim()}\n`);
      await writable.close();
      output.value = merged.content.trim();
      rawInput.value = merged.content.trim();
      return `已保存到 ${handle.name}：新增 ${merged.added}，删除 ${merged.removed}`;
    }

    function downloadFallback() {
      const merged = mergeTickerText('', rawInput.value);
      if (!merged.content.trim()) throw new Error('download content is empty');
      const blob = new Blob([`${merged.content.trim()}\n`], {type: 'text/plain;charset=utf-8'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'tickers.txt';
      link.click();
      URL.revokeObjectURL(link.href);
      output.value = merged.content.trim();
      return '当前浏览器不支持直接写文件，已下载 tickers.txt。';
    }

    document.querySelector('#save-button').addEventListener('click', async () => {
      formatInput();
      if (!output.value && !/(^|\n)\s*(remove|rm|delete|del|删除|移除)\b/i.test(rawInput.value)) return;
      try {
        status.textContent = await saveViaLocalService();
      } catch (serviceError) {
        try {
          status.textContent = await saveViaFilePicker();
        } catch (fileError) {
          try {
            status.textContent = downloadFallback();
          } catch (downloadError) {
            status.textContent = '没有识别到有效股票代码。';
          }
        }
      }
    });
  </script>
</body>
</html>
