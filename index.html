</style></head><body><header><h1>Daily Metrics Archive</h1><p>最新归档：2026-07-02</p></header><main><h2>持续更新</h2><ul><li><a href="latest/index.html">打开最新结果</a></li><li><a href="inputs/index.html">卖出分析</a></li></ul><h2>历史搜索</h2><p class="hint">搜索股票代码或公司名，查看它过去在哪些日期、策略和榜单里出现过。</p><div class="search-box"><input id="archive-search" type="search" placeholder="例如 MU、MRVL、Labcorp"><button id="archive-search-button" type="button">搜索</button></div><p class="count" id="archive-count">输入后开始搜索。</p><div id="archive-results"></div><h2>历史日期</h2><ul><li><a href="2026-07-02/index.html">2026-07-02</a></li>

const input=document.querySelector('#archive-search');const button=document.querySelector('#archive-search-button');const count=document.querySelector('#archive-count');const results=document.querySelector('#archive-results');let archiveData=[];
const money=value=>value===null||value===undefined||value===''?'':`$${Number(value).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const pct=value=>value===null||value===undefined||value===''?'':`${Number(value)>=0?'+':''}${(Number(value)*100).toFixed(2)}%`;
function render(items){if(!items.length){results.innerHTML='<p class="empty">没有找到匹配的历史记录。</p>';return;}const rows=items.slice(0,300).map(item=>`<tr><td><a href="${item.href}">${item.date}</a></td><td>${item.strategy}</td><td>${item.universe}</td><td>${item.ticker}</td><td class="name" title="${item.name}">${item.name}</td><td>${item.sector||''}</td><td>${item.rank}</td><td>${money(item.close)}</td><td class="${Number(item.next_return)>=0?'positive':'negative'}">${pct(item.next_return)}</td></tr>`).join('');results.innerHTML=`<div class="table-wrap"><table><thead><tr><th>日期</th><th>策略</th><th>榜单</th><th>股票</th><th>公司</th><th>板块</th><th>当日预测排名</th><th>收盘价</th><th>下一快照涨跌幅</th></tr></thead><tbody>${rows}</tbody></table></div>`;}
function search(){const query=input.value.trim().toLowerCase();if(!query){count.textContent='输入后开始搜索。';results.innerHTML='';return;}const items=archiveData.filter(item=>item.ticker.toLowerCase().includes(query)||item.name.toLowerCase().includes(query));count.textContent=`找到 ${items.length} 条历史记录${items.length>300?'，显示前 300 条':''}。`;render(items);}
fetch(`archive-search-index.json?v=20260702113343`).then(response=>response.json()).then(data=>{archiveData=data;search();}).catch(()=>{count.textContent='搜索索引暂时无法加载。';});button.addEventListener('click',search);input.addEventListener('input',search);
</script></body></html>
